x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.7.1
  environment: &kafka-common-env
    KAFKA_PROCESS_ROLES: "broker,controller"
    KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
    KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9093,3@kafka3:9093"
    KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
    # Replication settings deliberately >1 so you can watch ISR shrink/grow
    # and leader election happen when you stop/start a broker.
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
  healthcheck:
    test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
    interval: 10s
    timeout: 10s
    retries: 15

services:
  kafka1:
    <<: *kafka-common
    container_name: kafka1
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka1:9092,EXTERNAL://localhost:29092"
    ports:
      - "29092:29092"
    volumes:
      - kafka1-data:/var/lib/kafka/data

  kafka2:
    <<: *kafka-common
    container_name: kafka2
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka2:9092,EXTERNAL://localhost:29093"
    ports:
      - "29093:29093"
    volumes:
      - kafka2-data:/var/lib/kafka/data

  kafka3:
    <<: *kafka-common
    container_name: kafka3
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka3:9092,EXTERNAL://localhost:29094"
    ports:
      - "29094:29094"
    volumes:
      - kafka3-data:/var/lib/kafka/data

  # One-shot job: creates the topics used by the demo, then exits.
  # `docker compose up` will show it as "exited (0)" once done - that's expected.
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-init
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka1:9092 --create --if-not-exists \
          --topic events --partitions 6 --replication-factor 3 \
          --config min.insync.replicas=2
        kafka-topics --bootstrap-server kafka1:9092 --create --if-not-exists \
          --topic events.dlq --partitions 3 --replication-factor 3
        echo "Topics created:"
        kafka-topics --bootstrap-server kafka1:9092 --describe

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRASERVERS: kafka1:9092,kafka2:9092,kafka3:9092

  producer:
    build: ./producer
    container_name: producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      TOPIC: events
      ACKS: all
      LINGER_MS: 50
      BATCH_SIZE: 16384
      COMPRESSION_TYPE: snappy
      ENABLE_IDEMPOTENCE: "true"
      MESSAGES_PER_SECOND: 5
      KEY_CARDINALITY: 20
    restart: unless-stopped

  consumer:
    build: ./consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      TOPIC: events
      GROUP_ID: learning-consumer-group
      ENABLE_AUTO_COMMIT: "false"
      PROCESSING_DELAY_MS: 200
      RUST_LOG: info
    restart: unless-stopped

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
